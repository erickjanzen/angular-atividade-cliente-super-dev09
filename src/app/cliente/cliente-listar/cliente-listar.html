<h1>Clientes</h1>

<a routerLink="/clientes/cadastrar" class="cadastrar">Cadastrar cliente</a>

<span>Qtd clientes: <span class="quantidade">{{clientes().length}}</span></span>

<table>
    <thead>
        <th>Nome</th>
        <th>Email</th>
        <th>Telefone</th>
        <th></th>
    </thead>
    <tbody>
        <!-- 
        for (let i = 0; i < produtos.length; i++){
            let produto = produtos[i];
        }
        -->
        @for(cliente of clientes(); track cliente.id){

            <tr>
                <td>{{cliente.nome}}</td>
                <td>{{cliente.email}}</td>
                <td>{{cliente.telefone}}</td>
                <td>
                    <a class="editar" routerLink="/clientes/editar/{{cliente.id}}">Editar</a>
                    <button class="apagar" (click)="apagar(cliente.id)">Apagar</button>
                </td>
            </tr>
        }
    </tbody>
</table>
